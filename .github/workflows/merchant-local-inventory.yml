name: Merchant local inventory validation and upload

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to Merchant Center API"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      upload_limit:
        description: "Optional row limit for test upload; 0 means all rows"
        required: true
        default: "0"
      upload_sku:
        description: "Optional SKU filter for targeted test upload"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  export-local-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch script for current API scopes and Merchant payload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/export_local_inventory.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('location { id name }', 'location { id }')
          text = text.replace('        "pickupCost": merchant_price_from_czk(row["pickup_cost"]),\n', '')
          text = text.replace(
              '    product_key = f"local~{GOOGLE_LANGUAGE}~{GOOGLE_FEED_LABEL}~{offer_id}"\n',
              '    product_key = f"{GOOGLE_LANGUAGE}~{GOOGLE_FEED_LABEL}~{offer_id}"\n'
          )
          text = text.replace(
              '    product_key = f"online~{GOOGLE_LANGUAGE}~{GOOGLE_FEED_LABEL}~{offer_id}"\n',
              '    product_key = f"{GOOGLE_LANGUAGE}~{GOOGLE_FEED_LABEL}~{offer_id}"\n'
          )
          text = text.replace(
              '        response = requests.request(method, url, headers=headers, json=json_body, timeout=timeout)\n',
              '        try:\n'
              '            response = requests.request(method, url, headers=headers, json=json_body, timeout=timeout)\n'
              '        except requests.exceptions.RequestException as exc:\n'
              '            if attempt == max_retries:\n'
              '                return 598, {}, str(exc)[:4000]\n'
              '            wait_seconds = min(90, (2 ** (attempt - 1)) * 5)\n'
              '            print(f"Merchant API request exception. Attempt {attempt}/{max_retries}. Waiting {wait_seconds}s. {exc}", flush=True)\n'
              '            time.sleep(wait_seconds)\n'
              '            continue\n'
          )

          text = text.replace(
              '    variant_availability: str\n    inventory_levels: List[Dict[str, Any]]\n',
              '    variant_availability: str\n    custom_label_0: str\n    custom_label_1: str\n    inventory_levels: List[Dict[str, Any]]\n'
          )
          text = text.replace(
              '            productDostupnost: metafield(namespace: "custom", key: "dostupnost") { value }\n',
              '            productDostupnost: metafield(namespace: "custom", key: "dostupnost") { value }\n'
              '            googleCustomLabel0: metafield(namespace: "mm-google-shopping", key: "custom_label_0") { value }\n'
              '            googleCustomLabel1: metafield(namespace: "mm-google-shopping", key: "custom_label_1") { value }\n'
          )
          text = text.replace(
              '                    variant_availability=first_metafield_value(node.get("variantAvailability"), node.get("variantDostupnost")),\n'
              '                    inventory_levels=inventory_levels,\n',
              '                    variant_availability=first_metafield_value(node.get("variantAvailability"), node.get("variantDostupnost")),\n'
              '                    custom_label_0=first_metafield_value(product.get("googleCustomLabel0")),\n'
              '                    custom_label_1=first_metafield_value(product.get("googleCustomLabel1")),\n'
              '                    inventory_levels=inventory_levels,\n'
          )
          text = text.replace(
              '                "shopify_availability_text": first_metafield_value(variant.variant_availability, variant.product_availability),\n'
              '            }\n',
              '                "shopify_availability_text": first_metafield_value(variant.variant_availability, variant.product_availability),\n'
              '                "custom_label_0": variant.custom_label_0,\n'
              '                "custom_label_1": variant.custom_label_1,\n'
              '            }\n'
          )
          text = text.replace(
              '        "local_shipping_label",\n    ]\n',
              '        "local_shipping_label",\n'
              '        "custom_label_0",\n'
              '        "custom_label_1",\n'
              '    ]\n'
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dry-run validation
        if: ${{ github.event.inputs.upload != 'true' }}
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2025-10' }}
          GOOGLE_MERCHANT_ID: ${{ secrets.MERCHANT_ACCOUNT_ID }}
          GOOGLE_LANGUAGE: cs
          GOOGLE_FEED_LABEL: CZ
        run: python scripts/export_local_inventory.py

      - name: Run upload
        if: ${{ github.event.inputs.upload == 'true' }}
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2025-10' }}
          GOOGLE_MERCHANT_ID: ${{ secrets.MERCHANT_ACCOUNT_ID }}
          GOOGLE_LANGUAGE: cs
          GOOGLE_FEED_LABEL: CZ
        run: |
          LIMIT="${{ github.event.inputs.upload_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="0"; fi
          if [ "$LIMIT" = "0" ]; then
            python scripts/export_local_inventory.py --upload
          else
            python scripts/export_local_inventory.py --upload --upload-limit "$LIMIT" --upload-sku "${{ github.event.inputs.upload_sku }}"
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merchant-local-inventory-audit
          path: out/
          if-no-files-found: warn


