name: Supplemental Source 3 feed generation
run-name: Supplemental Source 3 feed

on:
  schedule:
    # GitHub Actions uses UTC. 23:15 UTC is shortly after midnight in Czech time during summer time.
    - cron: "15 23 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: supplemental-source-3-pages
  cancel-in-progress: false

jobs:
  generate-supplemental-source-3:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Supplemental Source 3 feed
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2025-10' }}
          GOOGLE_LANGUAGE: cs
          GOOGLE_FEED_LABEL: CZK_105791684939
        run: python scripts/export_local_inventory.py

      - name: Validate generated supplemental feed
        run: |
          test -s out/SUPPLEMENTAL_SOURCE_3.tsv
          test -s out/summary.json
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path('out/SUPPLEMENTAL_SOURCE_3.tsv')
          expected = ['id', 'availability', 'price', 'sale price', 'sell on google quantity']
          with path.open('r', encoding='utf-8', newline='') as handle:
              reader = csv.reader(handle, delimiter='\t')
              header = next(reader)
              first_row = next(reader, None)
          if header != expected:
              raise SystemExit(f'{path}: unexpected header {header!r}, expected {expected!r}')
          if first_row is None:
              raise SystemExit(f'{path}: no product rows generated')
          print('Supplemental Source 3 feed validated.')
          PY

      - name: Prepare public feed site
        run: |
          mkdir -p public
          cp out/SUPPLEMENTAL_SOURCE_3.tsv public/SUPPLEMENTAL_SOURCE_3.tsv
          cp out/summary.json public/summary.json
          cp out/supplemental_source_3_preview.csv public/supplemental_source_3_preview.csv
          if [ -f out/control_variant_56264244887883_supplemental.csv ]; then cp out/control_variant_56264244887883_supplemental.csv public/control_variant_56264244887883_supplemental.csv; fi
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Boschino Supplemental Source 3 feed</title>
          </head>
          <body>
            <h1>Boschino Supplemental Source 3 feed</h1>
            <p>This repository publishes only the product-level supplemental feed for Boschino.cz.</p>
            <ul>
              <li><a href="SUPPLEMENTAL_SOURCE_3.tsv">SUPPLEMENTAL_SOURCE_3.tsv</a></li>
              <li><a href="summary.json">summary.json</a></li>
              <li><a href="supplemental_source_3_preview.csv">supplemental_source_3_preview.csv</a></li>
              <li><a href="control_variant_56264244887883_supplemental.csv">control_variant_56264244887883_supplemental.csv</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Upload feed artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supplemental-source-3-feed
          path: |
            out/SUPPLEMENTAL_SOURCE_3.tsv
            out/supplemental_source_3_preview.csv
            out/control_variant_56264244887883_supplemental.csv
            out/skipped_missing_sku.csv
            out/skipped_inactive_product.csv
            out/summary.json
          if-no-files-found: warn
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
