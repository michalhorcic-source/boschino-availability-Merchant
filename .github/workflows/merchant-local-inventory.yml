name: Merchant feed generation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload supplemental product data through Merchant API"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      upload_limit:
        description: "Optional supplemental API upload row limit; 0 means all rows"
        required: true
        default: "0"
      upload_offset:
        description: "Optional supplemental API upload row offset for batched/resumable uploads"
        required: true
        default: "0"
      upload_sku:
        description: "Compatibility only. Ignored for full feed generation."
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: merchant-feed-pages
  cancel-in-progress: false

jobs:
  generate-merchant-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate supplemental and local inventory feeds
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2025-10' }}
          GOOGLE_MERCHANT_ID: ${{ secrets.MERCHANT_ACCOUNT_ID }}
          GOOGLE_LANGUAGE: cs
          GOOGLE_FEED_LABEL: CZK_105791684939
        run: python scripts/export_local_inventory.py

      - name: Validate generated feed files
        run: |
          test -s out/SUPPLEMENTAL_SOURCE_3.tsv
          test -s out/LOCAL_INVENTORY.tsv
          test -s out/summary.json
          python - <<'PY'
          import csv
          from pathlib import Path

          checks = [
              (Path('out/SUPPLEMENTAL_SOURCE_3.tsv'), ['id', 'availability', 'price', 'sale price', 'sell on google quantity']),
              (Path('out/LOCAL_INVENTORY.tsv'), ['id', 'store code', 'availability', 'price', 'sale price', 'quantity', 'pickup method', 'pickup SLA', 'instore product location', 'local shipping label']),
          ]
          for path, expected in checks:
              with path.open('r', encoding='utf-8', newline='') as handle:
                  reader = csv.reader(handle, delimiter='\t')
                  header = next(reader)
              if header != expected:
                  raise SystemExit(f'{path}: unexpected header {header!r}, expected {expected!r}')
          print('Feed headers validated.')
          PY

      - name: Authenticate to Google Cloud
        if: ${{ github.event.inputs.upload == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload supplemental feed through Merchant API
        if: ${{ github.event.inputs.upload == 'true' }}
        env:
          GOOGLE_MERCHANT_ID: ${{ secrets.MERCHANT_ACCOUNT_ID }}
          GOOGLE_LANGUAGE: cs
          GOOGLE_FEED_LABEL: CZK_105791684939
          SUPPLEMENTAL_API_DATA_SOURCE: ${{ vars.SUPPLEMENTAL_API_DATA_SOURCE || '' }}
          SUPPLEMENTAL_API_DISPLAY_NAME: SUPPLEMENTAL_SOURCE_3_API
        run: |
          LIMIT="${{ github.event.inputs.upload_limit }}"
          OFFSET="${{ github.event.inputs.upload_offset }}"
          if [ -z "$LIMIT" ]; then LIMIT="0"; fi
          if [ -z "$OFFSET" ]; then OFFSET="0"; fi
          python scripts/upload_supplemental_api.py --limit "$LIMIT" --offset "$OFFSET"

      - name: Prepare public feed site
        run: |
          mkdir -p public
          cp out/SUPPLEMENTAL_SOURCE_3.tsv public/SUPPLEMENTAL_SOURCE_3.tsv
          cp out/LOCAL_INVENTORY.tsv public/LOCAL_INVENTORY.tsv
          cp out/summary.json public/summary.json
          cp out/control_sku_8996470703070.csv public/control_sku_8996470703070.csv
          if [ -f out/supplemental_api_summary.json ]; then cp out/supplemental_api_summary.json public/supplemental_api_summary.json; fi
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Boschino Merchant feeds</title>
          </head>
          <body>
            <h1>Boschino Merchant feeds</h1>
            <ul>
              <li><a href="SUPPLEMENTAL_SOURCE_3.tsv">SUPPLEMENTAL_SOURCE_3.tsv</a></li>
              <li><a href="LOCAL_INVENTORY.tsv">LOCAL_INVENTORY.tsv</a></li>
              <li><a href="summary.json">summary.json</a></li>
              <li><a href="control_sku_8996470703070.csv">control_sku_8996470703070.csv</a></li>
              <li><a href="supplemental_api_summary.json">supplemental_api_summary.json</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Upload feed artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merchant-feed-files
          path: |
            out/SUPPLEMENTAL_SOURCE_3.tsv
            out/LOCAL_INVENTORY.tsv
            out/supplemental_source_3_preview.csv
            out/local_inventory_shopify_preview.csv
            out/control_sku_8996470703070.csv
            out/skipped_missing_sku.csv
            out/skipped_inactive_product.csv
            out/summary.json
            out/supplemental_api_summary.json
            out/supplemental_api_payload_audit.csv
            out/supplemental_api_errors.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
